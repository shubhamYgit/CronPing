# ========================
# CronPing — Application Configuration
# ========================

spring:
  application:
    name: CronPing

  # ---- PostgreSQL ----
  datasource:
    url: jdbc:postgresql://localhost:5432/cronping_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  # ---- JPA / Hibernate ----
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # ---- Redis ----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ---- Security ----
  # (JWT-based — no spring.security.user needed)

# ---- JWT ----
jwt:
  secret: ${JWT_SECRET:change-me-to-a-secure-random-string-at-least-32-chars}
  expiration-ms: ${JWT_EXPIRATION:86400000}  # 24 hours

# ---- Server ----
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

# ---- Logging ----
logging:
  level:
    root: INFO
    com.cronping: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
